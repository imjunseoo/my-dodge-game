name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3 -> v4로 업데이트

      - name: set up JDK 17
        uses: actions/setup-java@v4  # v3 -> v4로 업데이트
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Gradle 래퍼 생성 및 빌드
      - name: Build with Gradle
        run: |
          gradle wrapper
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4  # v3 -> v4로 업데이트 (이 부분이 핵심!)
        with:
          name: my-game-apk
          path: app/build/outputs/apk/debug/app-debug.apk
